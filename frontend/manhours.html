<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#C00000">
  <title>VMMS — Monthly Man-Hours</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>window.esc=window.esc||function(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});};</script>
  <style>
    @media print { header, #controls { display: none !important; } body { background: white; } }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <header class="bg-red-700 text-white p-4 shadow flex items-center gap-3 sticky top-0 z-10">
    <a href="home.html" class="text-2xl font-bold leading-none">‹</a>
    <div class="flex-1">
      <h1 class="text-lg font-bold">Monthly Man-Hours</h1>
      <p class="text-red-100 text-xs" id="status">—</p>
    </div>
  </header>

  <main class="flex-1 p-4 max-w-2xl mx-auto w-full pb-10">
    <div id="controls" class="bg-white rounded-xl shadow p-4 mb-4 flex gap-2 items-end flex-wrap">
      <div class="flex-1 min-w-[140px]">
        <label class="text-xs text-gray-500">Month</label>
        <input id="month" type="month" class="w-full border border-gray-300 rounded-lg p-2">
      </div>
      <button onclick="load()" class="bg-red-700 text-white font-bold px-4 py-2 rounded-lg">Load</button>
      <button onclick="exportXlsx()" class="border-2 border-green-700 text-green-700 font-bold px-3 py-2 rounded-lg text-sm">Excel</button>
      <button onclick="window.print()" class="border-2 border-gray-500 text-gray-600 font-bold px-3 py-2 rounded-lg text-sm">Print/PDF</button>
      <button id="lockbtn" onclick="toggleLock()" class="hidden bg-gray-800 text-white font-bold px-3 py-2 rounded-lg text-sm">Close Month</button>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-4" id="totals"></div>

    <h2 class="text-sm font-bold text-gray-500 mb-2">PER SITE (spec §9.1)</h2>
    <div class="bg-white rounded-xl shadow overflow-x-auto mb-6">
      <table class="w-full text-xs" id="sitetbl"></table>
    </div>

    <h2 class="text-sm font-bold text-gray-500 mb-2">PER WORKER</h2>
    <div class="bg-white rounded-xl shadow overflow-x-auto">
      <table class="w-full text-xs" id="wtbl"></table>
    </div>
  </main>

  <script>
    requireLogin();
    let ME = null, D = null;

    async function boot() {
      const r = await vmmsApi("/api/v1/me");
      if (!r.ok) { vmmsLogout(); return; }
      ME = await r.json();
      document.getElementById("month").value = new Date().toISOString().slice(0, 7);
      await load();
    }

    async function load() {
      const m = document.getElementById("month").value;
      const r = await vmmsApi(`/api/v1/reports/manhours?month=${m}`);
      if (!r.ok) { const e = await r.json(); alert(e.detail || "Failed"); return; }
      D = await r.json();

      document.getElementById("status").textContent =
        D.locked ? "🔒 Month CLOSED by payroll" : "Month open";

      const lb = document.getElementById("lockbtn");
      if (["admin", "payroll"].includes(ME.role)) {
        lb.classList.remove("hidden");
        if (D.locked) {
          lb.textContent = "Re-open Month";
          lb.classList.toggle("hidden", ME.role !== "admin");
        } else {
          lb.textContent = "Close Month";
        }
      }

      document.getElementById("totals").innerHTML =
        `<div class="bg-white rounded-xl shadow p-4"><p class="text-2xl font-bold">${D.totals.nh}</p><p class="text-xs text-gray-500">Total normal hours</p></div>` +
        `<div class="bg-white rounded-xl shadow p-4"><p class="text-2xl font-bold text-red-700">${D.totals.ot}</p><p class="text-xs text-gray-500">Total OT hours</p></div>`;

      document.getElementById("sitetbl").innerHTML =
        "<thead class='bg-gray-50 text-gray-500'><tr><th class='text-left p-2'>Site</th><th class='text-right p-2'>Attendance days</th><th class='text-right p-2'>Workers</th><th class='text-right p-2'>Normal h</th><th class='text-right p-2'>OT h</th></tr></thead><tbody>" +
        D.sites.map(s => `<tr class="border-t border-gray-100"><td class="p-2 font-medium">${s.site}</td><td class="p-2 text-right">${s.attendance_days}</td><td class="p-2 text-right">${s.total_workers}</td><td class="p-2 text-right">${s.nh}</td><td class="p-2 text-right ${s.ot > 0 ? "text-red-700 font-bold" : ""}">${s.ot}</td></tr>`).join("") +
        "</tbody>";

      document.getElementById("wtbl").innerHTML =
        "<thead class='bg-gray-50 text-gray-500'><tr><th class='text-left p-2'>ID</th><th class='text-left p-2'>Worker</th><th class='text-right p-2'>Days</th><th class='text-right p-2'>Normal h</th><th class='text-right p-2'>OT h</th></tr></thead><tbody>" +
        D.workers.map(w => `<tr class="border-t border-gray-100"><td class="p-2">${esc(w.worker_code)}</td><td class="p-2 font-medium">${esc(w.name)}</td><td class="p-2 text-right">${w.days}</td><td class="p-2 text-right">${w.nh}</td><td class="p-2 text-right ${w.ot > 0 ? "text-red-700 font-bold" : ""}">${w.ot}</td></tr>`).join("") +
        "</tbody>";
    }

    async function toggleLock() {
      const m = document.getElementById("month").value;
      const action = D.locked ? "unlock" : "lock";
      const msg = D.locked
        ? "Re-open this month for editing? (Audit-logged)"
        : "Close this month? Attendance becomes locked for everyone except the administrator.";
      if (!confirm(msg)) return;
      const r = await vmmsApi(`/api/v1/months/${action}`, {
        method: "POST", body: JSON.stringify({ month: m }) });
      const data = await r.json();
      if (!r.ok) { alert(data.detail || "Failed"); return; }
      await load();
    }

    function exportXlsx() {
      if (!D) return;
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
        ["VMMS Monthly Man-Hours", D.month, D.locked ? "CLOSED" : "OPEN"], [],
        ["Site", "Attendance days", "Total workers", "Normal h", "OT h"],
        ...D.sites.map(s => [s.site, s.attendance_days, s.total_workers, s.nh, s.ot]),
        [], ["TOTAL", "", "", D.totals.nh, D.totals.ot]]), "Sites");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
        ["Worker ID", "Name", "Days", "Normal h", "OT h"],
        ...D.workers.map(w => [w.worker_code, w.name, w.days, w.nh, w.ot])]), "Workers");
      XLSX.writeFile(wb, `VMMS_ManHours_${D.month}.xlsx`);
    }

    boot();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
