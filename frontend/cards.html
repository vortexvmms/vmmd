<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#C00000">
  <title>VMMS — Safety Cards</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>window.esc=window.esc||function(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});};window.VMMS_TIER=window.VMMS_TIER||{full:["admin","general_manager","operation_manager","hr_assistant"],manager:["main_sup","wshc_lead"],supervisor:["site_sup","safety_sup","wshc","logistics_sup"]};window.isFull=window.isFull||function(r){return VMMS_TIER.full.indexOf(r)!==-1};window.isManager=window.isManager||function(r){return VMMS_TIER.manager.indexOf(r)!==-1};window.isSupervisor=window.isSupervisor||function(r){return VMMS_TIER.supervisor.indexOf(r)!==-1};window.isCoordinator=window.isCoordinator||function(r){return isFull(r)||isManager(r)};</script>
  <style>
    .cardimg{ width:86mm; height:54mm; object-fit:contain; border:1px solid #cbd5e1; background:#fff; border-radius:6px; }
    @media print {
      @page { size:A4 portrait; margin:10mm; }
      body{ background:#fff; }
      .no-print{ display:none !important; }
      #printview{ position:static !important; }
      .cardpage{ page-break-after:always; }
      .cardpage:last-child{ page-break-after:auto; }
      .cardrow{ page-break-inside:avoid; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-red-700 text-white p-4 shadow sticky top-0 z-10">
    <div class="flex items-center gap-3 max-w-3xl mx-auto w-full">
      <a href="home.html" class="text-2xl font-bold leading-none">‹</a>
      <div class="flex-1">
        <h1 class="text-lg font-bold">Safety Cards</h1>
        <p class="text-red-100 text-xs" id="summary">Loading…</p>
      </div>
      <button onclick="openPrint('all')" class="bg-white text-red-700 text-sm font-bold px-3 py-2 rounded-lg">Print all</button>
    </div>
  </header>

  <main class="flex-1 p-4 max-w-3xl mx-auto w-full pb-10">

    <input id="wsearch" type="search" placeholder="Search worker by name or ID…"
           class="w-full border border-gray-300 rounded-lg p-3 text-base mb-3">
    <div id="wlist" class="space-y-2"></div>

    <!-- Selected worker -->
    <div id="wview" class="hidden">
      <div class="bg-gray-100 border border-gray-300 rounded-xl shadow-sm p-4 mb-3">
        <div class="flex items-center justify-between gap-2 flex-wrap">
          <div>
            <p class="font-bold text-gray-800" id="w-name">—</p>
            <p class="text-xs text-gray-500" id="w-code">—</p>
          </div>
          <div class="flex gap-2">
            <button onclick="backToList()" class="border border-gray-300 text-gray-700 text-sm font-bold px-3 py-2 rounded-lg">← Workers</button>
            <button onclick="openPrint('one')" class="bg-gray-800 text-white text-sm font-bold px-3 py-2 rounded-lg">Print this worker</button>
          </div>
        </div>
      </div>

      <!-- Add card -->
      <div id="addbox" class="bg-white border border-gray-300 rounded-xl shadow-sm p-4 mb-4">
        <p class="font-bold text-gray-800 mb-3">➕ Add a card</p>
        <input id="c-label" type="text" placeholder="Card / course name (e.g. Confined Space)"
               class="w-full border border-gray-300 rounded-lg p-2 text-base mb-2">
        <div class="grid grid-cols-2 gap-2">
          <label class="text-sm text-gray-600">Front photo
            <input id="c-front" type="file" accept="image/*" capture="environment" class="mt-1 block w-full text-sm">
          </label>
          <label class="text-sm text-gray-600">Back photo
            <input id="c-back" type="file" accept="image/*" capture="environment" class="mt-1 block w-full text-sm">
          </label>
        </div>
        <button onclick="addCard()" id="c-add" class="mt-3 w-full bg-red-700 hover:bg-red-800 text-white font-bold py-3 rounded-lg disabled:opacity-50">Add card</button>
      </div>

      <div id="cards" class="space-y-3"></div>
      <p id="nocards" class="hidden text-center text-gray-400 mt-6">No cards yet for this worker.</p>
    </div>
  </main>

  <!-- Print overlay -->
  <div id="printview" class="hidden fixed inset-0 bg-white z-40 overflow-auto">
    <div class="no-print sticky top-0 bg-red-700 text-white p-3 shadow flex items-center gap-2">
      <button onclick="closePrint()" class="text-xl font-bold">‹</button>
      <span class="flex-1 font-bold" id="p-title">Cards — 4 per page</span>
      <button onclick="downloadCardsPdf()" class="bg-white text-red-700 text-sm font-bold px-3 py-2 rounded-lg">Download PDF</button>
      <button onclick="window.print()" class="bg-red-900 text-white text-sm font-bold px-3 py-2 rounded-lg">Print</button>
    </div>
    <div id="p-loading" class="text-center text-gray-500 p-8">Preparing images…</div>
    <div id="printsheet" class="p-3"></div>
  </div>

  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm px-4 py-2 rounded-full shadow max-w-[90%] text-center z-50"></div>

  <script>
    requireLogin();
    const BUCKET = "worker-cards";
    let ME = null, WORKERS = [], WORKER = null, CARDS = [];

    function toast(m, long){ const t=document.getElementById("toast"); t.textContent=m; t.classList.remove("hidden"); setTimeout(()=>t.classList.add("hidden"), long?6000:2800); }
    function tok(){ const s=getSession(); return s ? s.access_token : ""; }
    const canManage = () => ME && (isFull(ME.role) || isManager(ME.role) || isSupervisor(ME.role));

    // ---- Supabase Storage helpers (direct, RLS-guarded) ----
    async function uploadImg(path, blob){
      const r = await fetch(`${VMMS_CONFIG.SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
        method:"POST",
        headers:{ apikey:VMMS_CONFIG.SUPABASE_PUBLISHABLE, Authorization:`Bearer ${tok()}`, "x-upsert":"true", "Content-Type":"image/jpeg" },
        body: blob });
      if(!r.ok){ throw new Error("Upload failed (" + r.status + ")"); }
      return true;
    }
    async function signedUrl(path){
      if(!path) return null;
      const r = await fetch(`${VMMS_CONFIG.SUPABASE_URL}/storage/v1/object/sign/${BUCKET}/${path}`, {
        method:"POST",
        headers:{ apikey:VMMS_CONFIG.SUPABASE_PUBLISHABLE, Authorization:`Bearer ${tok()}`, "Content-Type":"application/json" },
        body: JSON.stringify({ expiresIn: 3600 }) });
      if(!r.ok) return null;
      const d = await r.json();
      // Supabase returns signedURL relative to the storage API root (/storage/v1)
      return VMMS_CONFIG.SUPABASE_URL + "/storage/v1" + (d.signedURL || d.signedUrl || "");
    }
    async function toDataURL(url){
      try{ const r=await fetch(url); const b=await r.blob();
        return await new Promise(res=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.readAsDataURL(b); }); }
      catch(e){ return null; }
    }
    // shrink + jpeg so uploads stay small
    function compress(file){
      return new Promise((res, rej)=>{
        const img=new Image(), url=URL.createObjectURL(file);
        img.onload=()=>{ const maxW=1100, sc=Math.min(1, maxW/img.width);
          const w=Math.round(img.width*sc), h=Math.round(img.height*sc);
          const c=document.createElement("canvas"); c.width=w; c.height=h;
          c.getContext("2d").drawImage(img,0,0,w,h); URL.revokeObjectURL(url);
          c.toBlob(b=> b?res(b):rej(new Error("compress failed")), "image/jpeg", 0.82); };
        img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error("Not a valid image")); };
        img.src=url;
      });
    }

    async function boot(){
      const r = await vmmsApi("/api/v1/me");
      if(!r.ok){ vmmsLogout(); return; }
      ME = await r.json();
      const rw = await vmmsApi("/api/v1/workers");
      WORKERS = (rw.ok ? await rw.json() : []).filter(w => w.status !== "inactive");
      document.getElementById("summary").textContent =
        (canManage() ? "Manage & print" : "View & print") + " · " + WORKERS.length + " workers";
      if(!canManage()) document.getElementById("addbox")?.remove();
      renderList();
    }

    function renderList(){
      const q = document.getElementById("wsearch").value.trim().toLowerCase();
      const rows = WORKERS.filter(w => !q || w.name.toLowerCase().includes(q) || w.worker_code.toLowerCase().includes(q)).slice(0, 60);
      const list = document.getElementById("wlist");
      list.innerHTML = rows.map(w =>
        `<button onclick="openWorker('${w.id}')" class="w-full text-left bg-gray-100 border border-gray-300 rounded-xl shadow-sm p-3 flex items-center justify-between active:bg-gray-50">
           <span><span class="font-medium text-gray-800">${esc(w.name)}</span>
             <span class="text-xs text-gray-400"> · ${esc(w.worker_code)}</span></span>
           <span class="text-red-700 font-bold">›</span>
         </button>`).join("");
    }

    async function openWorker(id){
      WORKER = WORKERS.find(w => w.id === id);
      if(!WORKER) return;
      document.getElementById("wlist").classList.add("hidden");
      document.getElementById("wsearch").classList.add("hidden");
      document.getElementById("wview").classList.remove("hidden");
      document.getElementById("w-name").textContent = WORKER.name;
      document.getElementById("w-code").textContent = WORKER.worker_code;
      await loadCards();
    }
    function backToList(){
      document.getElementById("wview").classList.add("hidden");
      document.getElementById("wlist").classList.remove("hidden");
      document.getElementById("wsearch").classList.remove("hidden");
      WORKER = null;
    }

    async function loadCards(){
      const r = await vmmsApi(`/api/v1/worker_cards?worker_id=${WORKER.id}`);
      CARDS = r.ok ? await r.json() : [];
      const box = document.getElementById("cards");
      document.getElementById("nocards").classList.toggle("hidden", CARDS.length > 0);
      box.innerHTML = "";
      for(const c of CARDS){
        const div = document.createElement("div");
        div.className = "bg-white border border-gray-300 rounded-xl shadow-sm p-3";
        div.innerHTML =
          `<div class="flex items-center justify-between mb-2">
             <p class="font-bold text-gray-800">${esc(c.label) || "Card"}</p>
             ${canManage() ? `<button data-del="${c.id}" class="text-red-600 text-sm font-bold">Delete</button>` : ""}
           </div>
           <div class="grid grid-cols-2 gap-2">
             <div><p class="text-[11px] text-gray-400 mb-1">Front</p><div class="fr bg-gray-100 rounded-lg h-28 flex items-center justify-center text-gray-300 text-xs">…</div></div>
             <div><p class="text-[11px] text-gray-400 mb-1">Back</p><div class="bk bg-gray-100 rounded-lg h-28 flex items-center justify-center text-gray-300 text-xs">…</div></div>
           </div>`;
        box.appendChild(div);
        // load thumbs
        signedUrl(c.front_path).then(u=>{ const el=div.querySelector(".fr"); if(u){ el.innerHTML=`<img src="${u}" class="max-h-28 rounded-lg">`; } else el.textContent="—"; });
        signedUrl(c.back_path).then(u=>{ const el=div.querySelector(".bk"); if(u){ el.innerHTML=`<img src="${u}" class="max-h-28 rounded-lg">`; } else el.textContent="—"; });
        const del = div.querySelector("[data-del]");
        if(del) del.addEventListener("click", ()=> deleteCard(c.id));
      }
    }

    async function addCard(){
      if(!canManage()){ toast("You can only view/print cards"); return; }
      const label = document.getElementById("c-label").value.trim();
      const front = document.getElementById("c-front").files[0];
      const back  = document.getElementById("c-back").files[0];
      if(!front && !back){ toast("Add at least a front photo"); return; }
      const btn = document.getElementById("c-add"); btn.disabled=true; btn.textContent="Uploading…";
      try{
        const uid = (crypto.randomUUID ? crypto.randomUUID() : Date.now()+"-"+Math.random().toString(36).slice(2));
        let fp=null, bp=null;
        if(front){ fp = `${WORKER.id}/${uid}_front.jpg`; await uploadImg(fp, await compress(front)); }
        if(back){  bp = `${WORKER.id}/${uid}_back.jpg`;  await uploadImg(bp, await compress(back)); }
        const r = await vmmsApi("/api/v1/worker_cards", { method:"POST",
          body: JSON.stringify({ worker_id: WORKER.id, label, front_path: fp, back_path: bp }) });
        const d = await r.json();
        if(!r.ok) throw new Error(d.detail || "Could not save card");
        document.getElementById("c-label").value=""; document.getElementById("c-front").value=""; document.getElementById("c-back").value="";
        toast("Card added");
        await loadCards();
      }catch(ex){ toast(ex.message, true); }
      finally{ btn.disabled=false; btn.textContent="Add card"; }
    }

    async function deleteCard(id){
      if(!confirm("Delete this card?")) return;
      try{
        const r = await vmmsApi(`/api/v1/worker_cards/${id}`, { method:"DELETE" });
        if(!r.ok){ const d=await r.json(); throw new Error(d.detail||"Could not delete"); }
        toast("Card deleted");
        await loadCards();
      }catch(ex){ toast(ex.message, true); }
    }

    /* ---------------- Print: 4 cards per page, Front | Back rows ---------------- */
    async function openPrint(scope){
      document.getElementById("printview").classList.remove("hidden");
      document.getElementById("printsheet").innerHTML = "";
      document.getElementById("p-loading").classList.remove("hidden");
      document.getElementById("p-title").textContent =
        scope === "one" && WORKER ? `Cards — ${WORKER.name}` : "Cards — all workers";

      // gather cards
      let cards = [];
      try{
        if(scope === "one" && WORKER){
          const r = await vmmsApi(`/api/v1/worker_cards?worker_id=${WORKER.id}`);
          cards = r.ok ? await r.json() : [];
        } else {
          const r = await vmmsApi(`/api/v1/worker_cards`);
          cards = r.ok ? await r.json() : [];
        }
      }catch(e){ cards = []; }

      cards.sort((a,b)=> (a.worker_name+a.label).localeCompare(b.worker_name+b.label));

      // resolve images to data URLs (so print/PDF render reliably)
      for(const c of cards){
        c._front = c.front_path ? await toDataURL(await signedUrl(c.front_path)) : null;
        c._back  = c.back_path  ? await toDataURL(await signedUrl(c.back_path))  : null;
      }

      // 4 cards per A4 page
      const sheet = document.getElementById("printsheet");
      sheet.innerHTML = "";
      if(!cards.length){ sheet.innerHTML = '<p class="text-center text-gray-400 p-8">No cards to print.</p>'; }
      for(let i=0;i<cards.length;i+=4){
        const page = document.createElement("div");
        page.className = "cardpage space-y-3 mb-4";
        page.innerHTML = cards.slice(i,i+4).map(c =>
          `<div class="cardrow border border-gray-200 rounded-lg p-2">
             <p class="text-xs font-bold text-gray-700 mb-1">${esc(c.worker_code)}_${esc(c.worker_name)} · ${esc(c.label)||"Card"}</p>
             <div class="flex gap-3 items-center flex-wrap">
               ${c._front ? `<img class="cardimg" src="${c._front}">` : `<div class="cardimg flex items-center justify-center text-gray-300 text-xs">no front</div>`}
               ${c._back  ? `<img class="cardimg" src="${c._back}">`  : `<div class="cardimg flex items-center justify-center text-gray-300 text-xs">no back</div>`}
             </div>
           </div>`).join("");
        sheet.appendChild(page);
      }
      document.getElementById("p-loading").classList.add("hidden");
    }
    function closePrint(){ document.getElementById("printview").classList.add("hidden"); }
    function downloadCardsPdf(){
      const name = document.getElementById("p-title").textContent.replace(/[^a-z0-9]+/gi,"_");
      vmmsDownloadPdf("printsheet", "VMMS_" + name, { landscape:false });
    }

    document.getElementById("wsearch").addEventListener("input", renderList);
    boot();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
