<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#C00000">
  <title>VMMS — Workers</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>window.esc=window.esc||function(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});};window.VMMS_TIER=window.VMMS_TIER||{full:["admin","general_manager","operation_manager","hr_assistant"],manager:["main_sup","wshc_lead"],supervisor:["site_sup","safety_sup","wshc","logistics_sup"]};window.isFull=window.isFull||function(r){return VMMS_TIER.full.indexOf(r)!==-1};window.isManager=window.isManager||function(r){return VMMS_TIER.manager.indexOf(r)!==-1};window.isSupervisor=window.isSupervisor||function(r){return VMMS_TIER.supervisor.indexOf(r)!==-1};window.isCoordinator=window.isCoordinator||function(r){return isFull(r)||isManager(r)};</script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <header class="bg-red-700 text-white p-4 shadow flex items-center gap-3 sticky top-0 z-10">
    <a href="home.html" class="text-2xl font-bold leading-none">‹</a>
    <div class="flex-1">
      <h1 class="text-lg font-bold">Workers</h1>
      <p class="text-red-100 text-xs" id="count">Loading…</p>
    </div>
  </header>

  <main class="flex-1 p-4 max-w-md mx-auto w-full pb-24">

    <input id="search" type="search" placeholder="Search name or worker ID…"
           class="w-full border border-gray-300 rounded-lg p-3 text-base mb-3 focus:outline-none focus:ring-2 focus:ring-red-600">

    <div class="flex gap-2 mb-4 text-sm font-medium" id="chips">
      <button data-f="" class="chip bg-red-700 text-white px-3 py-1.5 rounded-full">All</button>
      <button data-f="active" class="chip bg-white text-gray-700 px-3 py-1.5 rounded-full border">Active</button>
      <button data-f="on_leave" class="chip bg-white text-gray-700 px-3 py-1.5 rounded-full border">On Leave</button>
      <button data-f="inactive" class="chip bg-white text-gray-700 px-3 py-1.5 rounded-full border">Inactive</button>
    </div>

    <div id="list" class="space-y-2"></div>
    <p id="empty" class="hidden text-center text-gray-400 mt-10">No workers found.</p>
  </main>

  <!-- Add buttons (admin only) -->
  <button id="fab-bulk" onclick="openBulk()" class="hidden fixed bottom-6 right-24 bg-gray-800 hover:bg-gray-900 text-white text-xs font-bold px-4 h-14 rounded-full shadow-lg">BULK<br>ADD</button>
  <button id="fab" onclick="openForm()" class="hidden fixed bottom-6 right-6 bg-red-700 hover:bg-red-800 text-white text-3xl w-14 h-14 rounded-full shadow-lg leading-none">+</button>

  <!-- Bulk import modal -->
  <div id="bulk-modal" class="hidden fixed inset-0 bg-black/50 z-20 flex items-end sm:items-center justify-center">
    <div class="bg-white w-full max-w-md rounded-t-2xl sm:rounded-2xl p-6 max-h-[90vh] overflow-y-auto">
      <h2 class="text-lg font-bold text-gray-800 mb-1">Bulk Add Workers</h2>
      <p class="text-xs text-gray-500 mb-3">One worker per line: <b>ID, Full Name</b><br>Example:<br><span class="font-mono">W013, Arumugam Kumaravel<br>W014, Ali Md Shujon</span><br>Existing IDs are skipped, never overwritten.</p>
      <textarea id="bulk-text" rows="10" placeholder="W013, Worker Name&#10;W014, Worker Name"
                class="w-full border border-gray-300 rounded-lg p-3 text-sm font-mono mb-2"></textarea>
      <p id="bulk-result" class="hidden text-sm rounded-lg p-3 mb-2"></p>
      <div class="flex gap-3">
        <button onclick="closeBulk()" class="flex-1 border border-gray-300 text-gray-700 font-bold py-3 rounded-lg">Close</button>
        <button id="bulk-save" onclick="runBulk()" class="flex-1 bg-red-700 hover:bg-red-800 text-white font-bold py-3 rounded-lg">Import</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/50 z-20 flex items-end sm:items-center justify-center">
    <div class="bg-white w-full max-w-md rounded-t-2xl sm:rounded-2xl p-6">
      <h2 id="m-title" class="text-lg font-bold text-gray-800 mb-4">Add Worker</h2>

      <label class="block text-sm font-medium text-gray-700 mb-1">Worker ID</label>
      <input id="m-code" class="w-full border border-gray-300 rounded-lg p-3 text-base mb-3 uppercase" placeholder="e.g. W013">

      <label class="block text-sm font-medium text-gray-700 mb-1">Full Name (as in WhatsApp message)</label>
      <input id="m-name" class="w-full border border-gray-300 rounded-lg p-3 text-base mb-3" placeholder="e.g. Arumugam Kumaravel">

      <div id="m-status-wrap" class="hidden">
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select id="m-status" class="w-full border border-gray-300 rounded-lg p-3 text-base mb-3 bg-white">
          <option value="active">Active</option>
          <option value="on_leave">On Leave (overseas)</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>

      <p id="m-error" class="text-sm font-medium text-red-600 hidden mb-2"></p>

      <div class="flex gap-3 mt-2">
        <button onclick="closeForm()" class="flex-1 border border-gray-300 text-gray-700 font-bold py-3 rounded-lg">Cancel</button>
        <button id="m-save" onclick="save()" class="flex-1 bg-red-700 hover:bg-red-800 text-white font-bold py-3 rounded-lg">Save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm px-4 py-2 rounded-full shadow"></div>

  <script>
    requireLogin();

    let ME = null, ALL = [], FILTER = "", EDIT_ID = null;

    const STATUS_CHIP = {
      active:   ["Active", "bg-green-100 text-green-700"],
      on_leave: ["On Leave", "bg-yellow-100 text-yellow-700"],
      inactive: ["Inactive", "bg-gray-200 text-gray-500"],
    };

    function toast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.remove("hidden");
      setTimeout(() => t.classList.add("hidden"), 2500);
    }

    async function boot() {
      const r = await vmmsApi("/api/v1/me");
      if (!r.ok) { vmmsLogout(); return; }
      ME = await r.json();
      if (isFull(ME.role)) {
        document.getElementById("fab").classList.remove("hidden");
        document.getElementById("fab-bulk").classList.remove("hidden");
      }
      await load();
    }

    async function load() {
      const r = await vmmsApi("/api/v1/workers");
      if (!r.ok) { toast("Could not load workers"); return; }
      ALL = await r.json();
      render();
    }

    function render() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const rows = ALL.filter(w =>
        (!FILTER || w.status === FILTER) &&
        (!q || w.name.toLowerCase().includes(q) || w.worker_code.toLowerCase().includes(q))
      );
      document.getElementById("count").textContent =
        `${rows.length} shown · ${ALL.filter(w => w.status === "active").length} active of ${ALL.length}`;
      const list = document.getElementById("list");
      list.innerHTML = "";
      document.getElementById("empty").classList.toggle("hidden", rows.length > 0);
      rows.forEach(w => {
        const [label, cls] = STATUS_CHIP[w.status] || [w.status, "bg-gray-100"];
        const div = document.createElement("div");
        div.className = "bg-white rounded-xl shadow p-4 flex items-center justify-between";
        div.innerHTML =
          `<div><p class="font-medium text-gray-800">${esc(w.name)}</p>
           <p class="text-xs text-gray-400">${esc(w.worker_code)}</p></div>
           <span class="text-xs font-bold px-3 py-1 rounded-full ${cls}">${label}</span>`;
        if (isFull(ME.role)) {
          div.classList.add("cursor-pointer", "active:bg-gray-50");
          div.onclick = () => openForm(w);
        }
        list.appendChild(div);
      });
    }

    function openForm(w = null) {
      EDIT_ID = w ? w.id : null;
      document.getElementById("m-title").textContent = w ? "Edit Worker" : "Add Worker";
      document.getElementById("m-code").value = w ? w.worker_code : "";
      document.getElementById("m-code").disabled = !!w;   // Worker ID immutable (spec FR-2)
      document.getElementById("m-name").value = w ? w.name : "";
      document.getElementById("m-name").disabled = false;   // full-access tier edits everything
      document.getElementById("m-status-wrap").classList.toggle("hidden", !w);
      if (w) document.getElementById("m-status").value = w.status;
      document.getElementById("m-error").classList.add("hidden");
      document.getElementById("modal").classList.remove("hidden");
    }

    function closeForm() { document.getElementById("modal").classList.add("hidden"); }

    async function save() {
      const err = document.getElementById("m-error");
      const btn = document.getElementById("m-save");
      err.classList.add("hidden");
      btn.disabled = true; btn.textContent = "Saving…";
      try {
        let r;
        if (EDIT_ID) {
          r = await vmmsApi(`/api/v1/workers/${EDIT_ID}`, {
            method: "PATCH",
            body: JSON.stringify({
              name: document.getElementById("m-name").disabled ? undefined : document.getElementById("m-name").value,
              status: document.getElementById("m-status").value,
            }),
          });
        } else {
          r = await vmmsApi("/api/v1/workers", {
            method: "POST",
            body: JSON.stringify({
              worker_code: document.getElementById("m-code").value,
              name: document.getElementById("m-name").value,
            }),
          });
        }
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || "Could not save");
        closeForm();
        toast(EDIT_ID ? "Worker updated" : "Worker added");
        await load();
      } catch (ex) {
        err.textContent = ex.message; err.classList.remove("hidden");
      } finally {
        btn.disabled = false; btn.textContent = "Save";
      }
    }

    function openBulk() {
      document.getElementById("bulk-result").classList.add("hidden");
      document.getElementById("bulk-modal").classList.remove("hidden");
    }
    function closeBulk() { document.getElementById("bulk-modal").classList.add("hidden"); }

    async function runBulk() {
      const lines = document.getElementById("bulk-text").value.split("\n")
        .map(l => l.trim()).filter(l => l);
      const workers = lines.map(l => {
        const i = l.indexOf(",");
        return i > 0
          ? { worker_code: l.slice(0, i).trim(), name: l.slice(i + 1).trim() }
          : { worker_code: "", name: l };   // missing comma -> flagged by server
      });
      if (!workers.length) { toast("Paste your list first"); return; }
      const btn = document.getElementById("bulk-save");
      btn.disabled = true; btn.textContent = "Importing…";
      try {
        const r = await vmmsApi("/api/v1/workers/bulk", {
          method: "POST", body: JSON.stringify({ workers }) });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || "Import failed");
        const res = document.getElementById("bulk-result");
        res.className = "text-sm rounded-lg p-3 mb-2 bg-green-50 text-green-800 border border-green-200";
        res.innerHTML = `✓ ${d.added} added · ${d.skipped_existing} already existed (skipped)` +
          (d.line_errors.length ? `<br>⚠ ${d.line_errors.join("<br>⚠ ")}` : "");
        res.classList.remove("hidden");
        await load();
      } catch (ex) {
        const res = document.getElementById("bulk-result");
        res.className = "text-sm rounded-lg p-3 mb-2 bg-red-50 text-red-700 border border-red-200";
        res.textContent = ex.message;
        res.classList.remove("hidden");
      } finally {
        btn.disabled = false; btn.textContent = "Import";
      }
    }

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("chips").addEventListener("click", (e) => {
      const b = e.target.closest("button"); if (!b) return;
      FILTER = b.dataset.f;
      document.querySelectorAll(".chip").forEach(c => {
        c.className = "chip px-3 py-1.5 rounded-full " +
          (c === b ? "bg-red-700 text-white" : "bg-white text-gray-700 border");
      });
      render();
    });

    boot();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
