<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#C00000">
  <title>VMMS — How to Use</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-red-700 text-white p-4 shadow sticky top-0 z-10">
    <div class="flex items-center gap-3 max-w-3xl mx-auto w-full">
      <a href="home.html" class="text-2xl font-bold leading-none">‹</a>
      <div class="flex-1">
        <h1 class="text-lg font-bold">How to Use</h1>
        <p class="text-red-100 text-xs" id="role">Loading…</p>
      </div>
    </div>
  </header>

  <main class="flex-1 p-4 max-w-3xl mx-auto w-full pb-12">
    <div id="intro" class="bg-gray-100 border border-gray-300 rounded-xl shadow-sm p-4 mb-4 text-sm text-gray-700"></div>
    <div id="sections" class="space-y-3"></div>
  </main>

  <script>
    requireLogin();

    // Each section: { h: heading, items: [ "line", ... ] }
    const COMMON_INTRO =
      "This is your quick guide. Tap a heading to open or close it. " +
      "The app stays signed in. First time each morning it may take up to 1 minute to wake up — please wait, don't tap many times.";

    const INSTALL = { h: "First time only — put VMMS on your phone", items: [
      "Open Chrome and go to:  vortexvmms.github.io/vmmd",
      "Chrome menu (⋮)  →  \"Add to Home screen\"  →  Add",
      "The red VMMS icon now sits on your phone like an app",
      "Sign in with the email and password given by the office. It stays signed in.",
    ]};

    const SITE_SUP = [
      INSTALL,
      { h: "Request manpower for the next day", items: [
        "Open Request Manpower. Your site and tomorrow's date are already set.",
        "Tick the workers you want at your site tomorrow, then press Send Request.",
        "Shortcut: press \"Copy last request\" to bring back your previous list, then adjust.",
        "You can change and re-send any time — the office sees your latest request while planning.",
      ]},
      { h: "Every morning — mark who came", items: [
        "Open Attendance. Your site and today's date show automatically.",
        "Everyone is ticked Present. Untick anyone who did not come.",
        "Choose the reason: ABSENT or MC (medical leave).",
        "Worker came to your site but was allocated elsewhere? Tap \"+ Worker reported to this site\", find his name, then choose:  M = he is with you all day  ·  S = split day (worked at both sites).",
      ]},
      { h: "Every evening — end times and message", items: [
        "Attendance → tap 5 PM / 7 PM / 10 PM to set the end time for ALL workers at once.",
        "Change the few who are different — tap the time card on their row (5PM…10PM, or ⋯ for another time).",
        "Check the bottom bar: Normal hours and OT hours for your site.",
        "Press SUBMIT DAY.",
        "Go to WhatsApp → Site Update → Generate → Share to WhatsApp.",
        "Made a mistake after submitting? You can still fix it — the app will ask you to type a reason.",
      ]},
      { h: "Dashboard & reports (your sites)", items: [
        "Dashboard shows your site's numbers. Use the date box to view any past day; press Print / PDF to save a copy.",
        "Reports let you pick a date range for your site and export to Excel or PDF.",
      ]},
      { h: "What the app does for you", items: [
        "You tick present / not present → the app records attendance.",
        "You tap the end time → the app calculates normal hours and OT by company rules.",
        "You press Generate + Share → the app writes the WhatsApp message, no typing, no mistakes.",
      ]},
      { h: "If something goes wrong", items: [
        "App slow to open in the morning → normal, wait up to 1 minute, it is waking up.",
        "\"Session expired\" → sign in again with your email and password.",
        "Forgot password → call the office; only the administrator can reset it.",
        "Worker missing from my list → use \"+ Worker reported to this site\".",
        "Wrong end time after submit → just change it and type the reason when asked.",
      ]},
    ];

    const ALLOCATOR = [
      { h: "Daily Allocation — two ways to work", items: [
        "By Worker (default): every worker is one row with a site dropdown. Change only the workers who move, then press Save All once. Changed rows turn yellow.",
        "By Site: pick a site, tick many workers for it, Save. Best when filling one site with a big batch.",
        "Copy previous day: if the date is empty, press it to bring yesterday forward, then adjust.",
        "A worker requested by a site shows a red REQUESTED badge, and the bar shows \"Requested here: X · Allocated: Y\".",
        "A worker can only be on one site a day — the app blocks double allocation automatically.",
      ]},
      { h: "Plan changes at night", items: [
        "Open Daily Allocation for that same date, change the sites, Save.",
        "Generate the allocation message again and send the new one to the group. No limit on how many times.",
      ]},
      { h: "WhatsApp messages", items: [
        "Allocation — one message for all sites (tomorrow's distribution).",
        "Request — one consolidated message of what every site asked for.",
        "Site Update — per-site end-of-day message (today).",
        "Generate → Copy or Share to WhatsApp. No typing, correct format every time.",
      ]},
      { h: "Dashboard", items: [
        "Pick any date to see that day's picture and the month-to-date totals per site.",
        "Print / PDF gives an A4 report with the Vortex header for filing or sending.",
      ]},
      { h: "During the month", items: [
        "Reports: any date range, any site — export Excel or print PDF.",
        "Monthly Man-Hours: month-end totals per site and per worker → export Excel for payroll, then press CLOSE MONTH to lock it.",
        "Workers: add new workers (BULK ADD for many); set On Leave when someone goes home.",
        "Sites: add a site, archive a finished one, assign supervisors.",
      ]},
      { h: "Rules built into the system", items: [
        "Normal hours: up to 8 hours a day (Mon–Fri); 1 hour lunch deducted.",
        "No lunch deduction if the worker finishes by 12:00 noon.",
        "Saturday: normal until 12:00 (max 4 h); everything after lunch is OT.",
        "Sunday & Public Holiday: all hours are OT.",
        "OT counts in half-hour steps, rounded down (17:45 finish = 0.5 OT).",
        "Split day (two sites): 8 normal hours counted once for the day, then OT.",
      ]},
    ];

    const ADMIN_EXTRA = [
      { h: "Administrator only", items: [
        "Settings: check OT rules and the public-holiday calendar each year.",
        "Assign supervisors to sites in Sites → this controls what each supervisor can see.",
        "New user logins are created in Supabase (Authentication), then linked to a VMMS role — see the setup guide.",
        "Only the administrator can reset a password or re-open a closed month.",
        "Deactivate staff who leave (set inactive) instead of deleting, to keep the history.",
      ]},
    ];

    const PAYROLL = [
      { h: "Reports", items: [
        "Pick a date range and site, then export to Excel or print to PDF.",
      ]},
      { h: "Monthly Man-Hours", items: [
        "Choose the month and check the totals per site and per worker.",
        "Export Excel (two sheets: per site and per worker) → use for payroll.",
        "Keep the exported file every month — it is your backup record.",
        "Press CLOSE MONTH when done; after this nobody can change that month except the administrator.",
      ]},
    ];

    const HELP = {
      admin:    ALLOCATOR.concat(ADMIN_EXTRA),
      main_sup: ALLOCATOR,
      site_sup: SITE_SUP,
      payroll:  PAYROLL,
    };

    const LABEL = { admin: "Administrator", main_sup: "Main Supervisor", site_sup: "Site Supervisor", payroll: "Payroll" };

    async function boot() {
      const r = await vmmsApi("/api/v1/me");
      if (!r.ok) { vmmsLogout(); return; }
      const me = await r.json();
      document.getElementById("role").textContent = "Guide for: " + (LABEL[me.role] || me.role);
      document.getElementById("intro").textContent = COMMON_INTRO;

      const sections = HELP[me.role] || [];
      const wrap = document.getElementById("sections");
      sections.forEach((s, i) => {
        const d = document.createElement("details");
        d.className = "bg-gray-100 border border-gray-300 rounded-xl shadow-sm overflow-hidden";
        if (i === 0) d.open = true;
        const lis = s.items.map(t => `<li class="mb-1">${t}</li>`).join("");
        d.innerHTML =
          `<summary class="cursor-pointer select-none p-4 font-bold text-red-700 flex items-center justify-between">
             <span>${s.h}</span><span class="text-gray-400 text-sm">▾</span>
           </summary>
           <ul class="list-disc pl-9 pr-4 pb-4 text-sm text-gray-700">${lis}</ul>`;
        wrap.appendChild(d);
      });
    }

    boot();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
