<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#C00000">
  <title>VMMS — Home</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>window.esc=window.esc||function(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});};window.VMMS_TIER=window.VMMS_TIER||{full:["admin","general_manager","operation_manager","hr_assistant"],manager:["main_sup","wshc_lead"],supervisor:["site_sup","safety_sup","wshc","logistics_sup"]};window.isFull=window.isFull||function(r){return VMMS_TIER.full.indexOf(r)!==-1};window.isManager=window.isManager||function(r){return VMMS_TIER.manager.indexOf(r)!==-1};window.isSupervisor=window.isSupervisor||function(r){return VMMS_TIER.supervisor.indexOf(r)!==-1};window.isCoordinator=window.isCoordinator||function(r){return isFull(r)||isManager(r)};</script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-red-700 text-white p-4 shadow flex items-center justify-between md:px-8">
    <div class="flex items-center gap-3">
      <img src="https://www.vortex.sg/images/Vortex-Logo_Type.png" alt="Vortex"
           class="h-9 bg-white rounded-lg p-1" onerror="this.style.display='none'">
      <div>
        <h1 class="text-xl font-bold">VMMS</h1>
        <p class="text-red-100 text-sm" id="who">Loading…</p>
      </div>
    </div>
    <button onclick="vmmsLogout()" class="bg-red-900 hover:bg-red-950 text-white text-sm font-bold px-4 py-2 rounded-lg">
      Log Out
    </button>
  </header>

  <main class="flex-1 p-4 max-w-md md:max-w-4xl mx-auto w-full">
    <div id="loading" class="text-center text-gray-500 mt-10">Checking your account…</div>

    <div id="content" class="hidden">
      <div class="bg-gray-100 border border-gray-300 rounded-xl shadow-sm p-5 mt-4">
        <p class="text-xl font-bold text-gray-800" id="greet">—</p>
        <p class="text-sm text-gray-500" id="name">—</p>
        <span id="role-chip" class="inline-block mt-2 text-xs font-bold px-3 py-1 rounded-full bg-red-100 text-red-700">—</span>
      </div>

      <div id="switcher" class="hidden bg-gray-100 border border-gray-300 rounded-xl shadow-sm p-3 mt-3 flex items-center gap-2">
        <span class="text-sm text-gray-600 whitespace-nowrap">Acting as:</span>
        <select id="viewrole" class="border border-gray-300 rounded-lg p-2 text-sm bg-white flex-1">
          <option value="admin">Administrator</option>
          <option value="general_manager">General Manager</option>
          <option value="operation_manager">Operation Manager</option>
          <option value="hr_assistant">HR Assistant</option>
          <option value="main_sup">Site Manager</option>
          <option value="wshc_lead">WSHC Lead</option>
          <option value="site_sup">Site Supervisor</option>
          <option value="safety_sup">Safety Supervisor</option>
          <option value="wshc">WSHC</option>
          <option value="logistics_sup">Logistics Supervisor</option>
          <option value="payroll">Payroll</option>
        </select>
      </div>

      <div class="mt-6 space-y-3 md:space-y-0 md:grid md:grid-cols-2 lg:grid-cols-3 md:gap-3" id="menu"></div>
    </div>

    <div id="noprofile" class="hidden bg-gray-100 border border-gray-300 rounded-xl shadow-sm p-6 mt-10 text-center">
      <div class="text-4xl mb-3">⚠️</div>
      <p class="font-bold text-gray-800 mb-2">Login works, but no VMMS role is linked yet.</p>
      <p class="text-sm text-gray-500">Ask the administrator to link your account (Phase 3 guide, Step 3).</p>
      <button onclick="vmmsLogout()" class="mt-5 bg-red-700 text-white font-bold px-6 py-2 rounded-lg">Back to Login</button>
    </div>
  </main>

  <footer class="p-4 flex items-center justify-center gap-2 text-xs text-gray-500">
    <img src="https://www.vortex.sg/images/Vortex-Logo_Type.png" alt="Vortex"
         class="h-6" onerror="this.style.display='none'">
    <span>Vortex Engineering Pte Ltd</span>
  </footer>

  <script>
    requireLogin();

    const ROLE_LABELS = {
      admin:"Administrator", general_manager:"General Manager", operation_manager:"Operation Manager",
      hr_assistant:"HR Assistant", main_sup:"Site Manager", wshc_lead:"WSHC Lead",
      site_sup:"Site Supervisor", safety_sup:"Safety Supervisor", wshc:"WSHC",
      logistics_sup:"Logistics Supervisor", payroll:"Payroll",
    };

    // Every role maps to one of four access tiers.
    const ROLE_TIER = {
      admin:"full", general_manager:"full", operation_manager:"full", hr_assistant:"full",
      main_sup:"manager", wshc_lead:"manager",
      site_sup:"supervisor", safety_sup:"supervisor", wshc:"supervisor", logistics_sup:"supervisor",
      payroll:"payroll",
    };

    // Menu per tier: [label, phase, page].
    const TIER_MENU = {
      full: [["Workers", 4, "workers.html"], ["Sites", 5, "sites.html"], ["Daily Allocation", 6, "allocation.html"], ["Attendance", 7, "attendance.html"], ["End-Time Verification", 7, "verify.html"], ["WhatsApp Messages", 9, "whatsapp.html"], ["Dashboard", 10, "dashboard.html"], ["Reports", 11, "reports.html"], ["Monthly Timesheet", 11, "timesheet.html"], ["Safety Cards", 3, "cards.html"], ["Users & Access", 3, "users.html"], ["Settings", 12, "settings.html"], ["How to Use", 1, "help.html"]],
      manager: [["Request Manpower (next day)", 6, "request.html"], ["Attendance", 7, "attendance.html"], ["End-Time Verification", 7, "verify.html"], ["WhatsApp (Site Update)", 9, "whatsapp.html"], ["Dashboard", 10, "dashboard.html"], ["Reports", 11, "reports.html"], ["Monthly Timesheet", 11, "timesheet.html"], ["Safety Cards", 3, "cards.html"], ["Settings", 12, "settings.html"], ["How to Use", 1, "help.html"]],
      supervisor: [["Request Manpower (next day)", 6, "request.html"], ["My Site — Attendance", 7, "attendance.html"], ["WhatsApp Update", 9, "whatsapp.html"], ["Dashboard (my sites)", 10, "dashboard.html"], ["Reports (my sites)", 11, "reports.html"], ["Safety Cards", 3, "cards.html"], ["How to Use", 1, "help.html"]],
      payroll: [["End-Time Verification", 7, "verify.html"], ["Reports", 11, "reports.html"], ["Monthly Timesheet", 11, "timesheet.html"], ["Monthly Man-Hours", 12, "manhours.html"], ["How to Use", 1, "help.html"]],
    };
    function menuFor(role) { return TIER_MENU[ROLE_TIER[role] || "supervisor"] || []; }
    const DONE_PHASE = 12; // raise this as phases complete

    function renderMenu(role) {
      const menu = document.getElementById("menu");
      menu.innerHTML = "";
      menuFor(role).forEach(([label, phase, page]) => {
        const unlocked = phase <= DONE_PHASE;
        const el = document.createElement(unlocked ? "a" : "div");
        if (unlocked) el.href = page;
        el.className = "bg-gray-100 border border-gray-300 rounded-xl shadow-sm p-4 flex items-center justify-between " + (unlocked ? "active:bg-gray-50" : "opacity-50");
        el.innerHTML = `<span class="font-medium text-gray-800">${label}</span>` +
          (unlocked ? `<span class="text-red-700 font-bold">›</span>`
                    : `<span class="text-xs text-gray-400">Phase ${phase}</span>`);
        menu.appendChild(el);
      });
    }

    async function load() {
      try {
        const r = await vmmsApi("/api/v1/me");
        if (r.status === 403) {
          document.getElementById("loading").classList.add("hidden");
          document.getElementById("noprofile").classList.remove("hidden");
          return;
        }
        if (!r.ok) throw new Error("NOT_SIGNED_IN");
        const me = await r.json();

        document.getElementById("who").textContent = me.email || "";
        const hr = new Date().getHours();
        const greet = hr < 12 ? "Good morning" : (hr < 17 ? "Good afternoon" : "Good evening");
        const first = (me.name || "").trim().split(/\s+/)[0] || "";
        document.getElementById("greet").textContent = `${greet}, ${first}`;
        document.getElementById("name").textContent = me.name;
        document.getElementById("role-chip").textContent = ROLE_LABELS[me.role] || me.role;

        // Only the Administrator can act as another role (a view switch on the menu).
        let viewRole = me.role;
        if (me.role === "admin") {
          viewRole = localStorage.getItem("vmms_view_role") || "admin";
          const sw = document.getElementById("switcher");
          const sel = document.getElementById("viewrole");
          sel.value = viewRole;
          sw.classList.remove("hidden");
          sel.addEventListener("change", () => {
            localStorage.setItem("vmms_view_role", sel.value);
            renderMenu(sel.value);
          });
        }
        renderMenu(viewRole);

        document.getElementById("loading").classList.add("hidden");
        document.getElementById("content").classList.remove("hidden");
      } catch (ex) {
        vmmsLogout();
      }
    }
    load();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
