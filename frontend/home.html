<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#C00000">
  <title>VMMS — Home</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <style>
  /* ===== VMMS — Modern Soft UI theme + subtle motion (prototype) ===== */
  :root{
    --vmms-red:#C00000; --vmms-red-dark:#A00000; --vmms-red-deep:#8A0000;
    --vmms-page:#eef0f3; --vmms-card:#ffffff; --vmms-line:#e7e9ee;
    --vmms-radius:16px;
    --vmms-shadow:0 1px 2px rgba(16,24,40,.05), 0 8px 20px -12px rgba(16,24,40,.22);
    --vmms-shadow-lg:0 16px 34px -14px rgba(16,24,40,.28);
    --vmms-ease:cubic-bezier(.22,.61,.36,1);
  }
  body{ background:var(--vmms-page) !important; }
  main{ animation:vmms-fade-up .34s var(--vmms-ease) both; }
  header.bg-red-700{
    background:linear-gradient(135deg,#C00000 0%,#9c0000 55%,#8a0000 100%) !important;
    box-shadow:0 8px 22px -12px rgba(138,0,0,.65); border-bottom:none;
  }
  .rounded-xl.shadow-sm{
    border-radius:var(--vmms-radius); box-shadow:var(--vmms-shadow) !important;
    transition:transform .18s var(--vmms-ease), box-shadow .18s var(--vmms-ease),
               background-color .18s ease, border-color .18s ease;
  }
  .bg-gray-100.rounded-xl{ background:var(--vmms-card); border-color:var(--vmms-line); }
  @media (hover:hover){
    a.rounded-xl.shadow-sm:hover, label.rounded-xl.shadow-sm:hover{
      transform:translateY(-2px); box-shadow:var(--vmms-shadow-lg) !important; }
  }
  a.rounded-xl.shadow-sm:active, label.rounded-xl.shadow-sm:active{ transform:scale(.985); }
  button{ transition:transform .12s var(--vmms-ease), box-shadow .18s var(--vmms-ease),
                       background-color .18s ease, opacity .18s ease; }
  button:not(:disabled):active{ transform:scale(.96); }
  button.bg-red-700{ box-shadow:0 8px 18px -10px rgba(192,0,0,.7); }
  input:focus,select:focus,textarea:focus{
    outline:none; border-color:var(--vmms-red) !important; box-shadow:0 0 0 3px rgba(192,0,0,.16); }
  #menu > *{ animation:vmms-fade-up .40s var(--vmms-ease) both; }
  #menu > *:nth-child(1){animation-delay:.03s} #menu > *:nth-child(2){animation-delay:.06s}
  #menu > *:nth-child(3){animation-delay:.09s} #menu > *:nth-child(4){animation-delay:.12s}
  #menu > *:nth-child(5){animation-delay:.15s} #menu > *:nth-child(6){animation-delay:.18s}
  #menu > *:nth-child(7){animation-delay:.21s} #menu > *:nth-child(8){animation-delay:.24s}
  #menu > *:nth-child(9){animation-delay:.27s} #menu > *:nth-child(10){animation-delay:.30s}
  #menu > *:nth-child(11){animation-delay:.33s} #menu > *:nth-child(12){animation-delay:.36s}
  #vmms-home-fab{ transition:transform .16s var(--vmms-ease), box-shadow .18s ease;
                  animation:vmms-pop .3s var(--vmms-ease) both .1s; }
  #vmms-home-fab:active{ transform:scale(.92); }
  @keyframes vmms-fade-up{ from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none} }
  @keyframes vmms-pop{ from{opacity:0; transform:scale(.8)} to{opacity:1; transform:scale(1)} }
  @media (prefers-reduced-motion: reduce){ *,*::before,*::after{ animation:none !important; transition:none !important; } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-red-700 text-white p-4 shadow flex items-center justify-between md:px-8">
    <div class="flex items-center gap-3">
      <img src="https://www.vortex.sg/images/Vortex-Logo_Type.png" alt="Vortex"
           class="h-9 bg-white rounded-lg p-1" onerror="this.style.display='none'">
      <div>
        <h1 class="text-xl font-bold">VMMS</h1>
        <p class="text-red-100 text-sm" id="who">Loading…</p>
      </div>
    </div>
    <button onclick="vmmsLogout()" class="bg-red-900 hover:bg-red-950 text-white text-sm font-bold px-4 py-2 rounded-lg">
      Log Out
    </button>
  </header>

  <main class="flex-1 p-4 max-w-md md:max-w-4xl mx-auto w-full">
    <div id="loading" class="text-center text-gray-500 mt-10">Checking your account…</div>

    <div id="content" class="hidden">
      <div class="bg-gray-100 border border-gray-300 rounded-xl shadow-sm p-5 mt-4">
        <p class="text-xl font-bold text-gray-800" id="greet">—</p>
        <p class="text-sm text-gray-500" id="name">—</p>
        <span id="role-chip" class="inline-block mt-2 text-xs font-bold px-3 py-1 rounded-full bg-red-100 text-red-700">—</span>
      </div>

      <div id="switcher" class="hidden bg-gray-100 border border-gray-300 rounded-xl shadow-sm p-3 mt-3 flex items-center gap-2">
        <span class="text-sm text-gray-600 whitespace-nowrap">Acting as:</span>
        <select id="viewrole" class="border border-gray-300 rounded-lg p-2 text-sm bg-white flex-1">
          <option value="admin">Administrator</option>
          <option value="main_sup">Main Supervisor</option>
          <option value="site_sup">Site Supervisor</option>
        </select>
      </div>

      <div class="mt-6 space-y-3 md:space-y-0 md:grid md:grid-cols-2 lg:grid-cols-3 md:gap-3" id="menu"></div>
    </div>

    <div id="noprofile" class="hidden bg-gray-100 border border-gray-300 rounded-xl shadow-sm p-6 mt-10 text-center">
      <div class="text-4xl mb-3">⚠️</div>
      <p class="font-bold text-gray-800 mb-2">Login works, but no VMMS role is linked yet.</p>
      <p class="text-sm text-gray-500">Ask the administrator to link your account (Phase 3 guide, Step 3).</p>
      <button onclick="vmmsLogout()" class="mt-5 bg-red-700 text-white font-bold px-6 py-2 rounded-lg">Back to Login</button>
    </div>
  </main>

  <footer class="p-4 flex items-center justify-center gap-2 text-xs text-gray-500">
    <img src="https://www.vortex.sg/images/Vortex-Logo_Type.png" alt="Vortex"
         class="h-6" onerror="this.style.display='none'">
    <span>Vortex Engineering Pte Ltd</span>
  </footer>

  <script>
    requireLogin();

    const ROLE_LABELS = {
      admin:    "Administrator",
      main_sup: "Main Supervisor",
      site_sup: "Site Supervisor",
      payroll:  "Payroll",
    };

    // Menu per role: [label, phase, page]. Phases not yet built are shown locked.
    const MENUS = {
      admin:    [["Workers", 4, "workers.html"], ["Sites", 5, "sites.html"], ["Daily Allocation", 6, "allocation.html"], ["Attendance", 7, "attendance.html"], ["End-Time Verification", 7, "verify.html"], ["WhatsApp Messages", 9, "whatsapp.html"], ["Dashboard", 10, "dashboard.html"], ["Reports", 11, "reports.html"], ["Monthly Timesheet", 11, "timesheet.html"], ["Settings", 12, "settings.html"], ["How to Use", 1, "help.html"]],
      main_sup: [["Request Manpower (next day)", 6, "request.html"], ["Attendance", 7, "attendance.html"], ["WhatsApp (Site Update)", 9, "whatsapp.html"], ["Workers (leave status)", 4, "workers.html"], ["Dashboard", 10, "dashboard.html"], ["Reports", 11, "reports.html"], ["Monthly Timesheet", 11, "timesheet.html"], ["How to Use", 1, "help.html"]],
      site_sup: [["Request Manpower (next day)", 6, "request.html"], ["My Site — Attendance", 7, "attendance.html"], ["WhatsApp Update", 9, "whatsapp.html"], ["Dashboard (my sites)", 10, "dashboard.html"], ["Reports (my sites)", 11, "reports.html"], ["Monthly Timesheet", 11, "timesheet.html"], ["How to Use", 1, "help.html"]],
      payroll:  [["End-Time Verification", 7, "verify.html"], ["Reports", 11, "reports.html"], ["Monthly Timesheet", 11, "timesheet.html"], ["Monthly Man-Hours", 12, "manhours.html"], ["How to Use", 1, "help.html"]],
    };
    const DONE_PHASE = 12; // raise this as phases complete

    function renderMenu(role) {
      const menu = document.getElementById("menu");
      menu.innerHTML = "";
      (MENUS[role] || []).forEach(([label, phase, page]) => {
        const unlocked = phase <= DONE_PHASE;
        const el = document.createElement(unlocked ? "a" : "div");
        if (unlocked) el.href = page;
        el.className = "bg-gray-100 border border-gray-300 rounded-xl shadow-sm p-4 flex items-center justify-between " + (unlocked ? "active:bg-gray-50" : "opacity-50");
        el.innerHTML = `<span class="font-medium text-gray-800">${label}</span>` +
          (unlocked ? `<span class="text-red-700 font-bold">›</span>`
                    : `<span class="text-xs text-gray-400">Phase ${phase}</span>`);
        menu.appendChild(el);
      });
    }

    async function load() {
      try {
        const r = await vmmsApi("/api/v1/me");
        if (r.status === 403) {
          document.getElementById("loading").classList.add("hidden");
          document.getElementById("noprofile").classList.remove("hidden");
          return;
        }
        if (!r.ok) throw new Error("NOT_SIGNED_IN");
        const me = await r.json();

        document.getElementById("who").textContent = me.email || "";
        const hr = new Date().getHours();
        const greet = hr < 12 ? "Good morning" : (hr < 17 ? "Good afternoon" : "Good evening");
        const first = (me.name || "").trim().split(/\s+/)[0] || "";
        document.getElementById("greet").textContent = `${greet}, ${first}`;
        document.getElementById("name").textContent = me.name;
        document.getElementById("role-chip").textContent = ROLE_LABELS[me.role] || me.role;

        // Only the Administrator can act as another role (a view switch on the menu).
        let viewRole = me.role;
        if (me.role === "admin") {
          viewRole = localStorage.getItem("vmms_view_role") || "admin";
          const sw = document.getElementById("switcher");
          const sel = document.getElementById("viewrole");
          sel.value = viewRole;
          sw.classList.remove("hidden");
          sel.addEventListener("change", () => {
            localStorage.setItem("vmms_view_role", sel.value);
            renderMenu(sel.value);
          });
        }
        renderMenu(viewRole);

        document.getElementById("loading").classList.add("hidden");
        document.getElementById("content").classList.remove("hidden");
      } catch (ex) {
        vmmsLogout();
      }
    }
    load();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
