<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#C00000">
  <title>VMMS — Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <style>
    .print-only { display: none; }
    @media print {
      @page { size: A4 portrait; margin: 14mm; }
      body { background: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      main { max-width: none !important; padding: 0 !important; }
      .card { box-shadow: none !important; }
      table { page-break-inside: auto; }
      tr, .card { page-break-inside: avoid; }
      h2 { page-break-after: avoid; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="no-print bg-red-700 text-white p-4 shadow sticky top-0 z-10">
   <div class="flex items-center gap-3 max-w-5xl mx-auto w-full">
    <a href="home.html" class="text-2xl font-bold leading-none">‹</a>
    <div class="flex-1">
      <h1 class="text-lg font-bold">Dashboard</h1>
      <p class="text-red-100 text-xs" id="asof">Loading…</p>
    </div>
    <button onclick="load()" title="Refresh" class="text-xl">⟳</button>
   </div>
   <div class="flex items-center gap-2 mt-3 max-w-5xl mx-auto w-full">
     <input id="date" type="date" class="rounded-lg p-2 text-gray-800 text-base">
     <button onclick="setToday()" class="bg-red-900 hover:bg-red-950 text-white text-sm font-bold px-3 py-2 rounded-lg">Today</button>
     <div class="flex-1"></div>
     <button onclick="window.print()" class="bg-white text-red-700 text-sm font-bold px-4 py-2 rounded-lg">Print / PDF</button>
   </div>
  </header>

  <!-- Printed A4 header (hidden on screen) -->
  <div class="print-only" style="border-bottom:3px solid #C00000; padding-bottom:8px; margin-bottom:14px;">
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div style="display:flex; align-items:center; gap:10px;">
        <img src="https://www.vortex.sg/images/Vortex-Logo_Type.png" alt="Vortex" style="height:34px;" onerror="this.style.display='none'">
        <div>
          <div style="font-size:15px; font-weight:bold; color:#C00000;">VORTEX MANPOWER MANAGEMENT SYSTEM</div>
          <div style="font-size:11px; color:#595959;">Daily Dashboard Report</div>
        </div>
      </div>
      <div style="font-size:10px; color:#595959; text-align:right; line-height:1.5;">
        <div><b>As of:</b> <span id="p-date">—</span></div>
        <div><b>Generated:</b> <span id="p-gen">—</span></div>
        <div><b>Prepared by:</b> <span id="p-user">—</span></div>
      </div>
    </div>
  </div>

  <main class="flex-1 p-4 max-w-md md:max-w-5xl mx-auto w-full pb-10">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="cards"></div>

    <h2 class="text-sm font-bold text-gray-500 mt-6 mb-2">UPDATES FOR THIS DAY</h2>
    <div class="card bg-gray-100 border border-gray-300 rounded-xl shadow-sm p-4">
      <div class="flex items-start gap-2 mb-2">
        <span class="text-xs font-bold px-2 py-1 rounded-full bg-yellow-100 text-yellow-700">PENDING</span>
        <p class="text-sm text-gray-700 flex-1" id="pending">—</p>
      </div>
      <div class="flex items-start gap-2">
        <span class="text-xs font-bold px-2 py-1 rounded-full bg-green-100 text-green-700">DONE</span>
        <p class="text-sm text-gray-700 flex-1" id="completed">—</p>
      </div>
      <div id="endremind" class="hidden flex gap-2 mt-3 no-print">
        <button onclick="copyEndReminder()" class="bg-gray-800 hover:bg-gray-900 text-white text-xs font-bold px-3 py-2 rounded-lg">Copy end-time reminder</button>
        <button onclick="shareEndReminder()" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold px-3 py-2 rounded-lg">Share to WhatsApp</button>
      </div>
    </div>

    <h2 class="text-sm font-bold text-gray-500 mt-6 mb-2">SITE SUMMARY (MONTH TO SELECTED DATE)</h2>
    <div class="card bg-gray-100 border border-gray-300 rounded-xl shadow-sm overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-200 text-gray-600 text-xs">
          <tr>
            <th class="text-left p-3">Site</th>
            <th class="text-right p-3">On day</th>
            <th class="text-right p-3">Normal h</th>
            <th class="text-right p-3">OT h</th>
          </tr>
        </thead>
        <tbody id="sites"></tbody>
        <tfoot id="sites-foot" class="border-t-2 border-gray-400 font-bold text-gray-800"></tfoot>
      </table>
    </div>

    <p class="print-only" style="font-size:9px; color:#8a8a8a; margin-top:12px;">
      VMMS · Internal Use Only · Figures are as recorded at time of printing.
    </p>
  </main>

  <script>
    requireLogin();

    let ME = null, SUPMAP = {}, PEND = [], PEND_DATE = "";
    const RDAYS = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
    const RMON = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

    function endReminderText() {
      const [y, m, d] = PEND_DATE.split("-");
      const dow = RDAYS[new Date(PEND_DATE + "T00:00:00").getDay()];
      const lines = ["*END TIME REMINDER*", `*${d}-${RMON[+m - 1]}-${y}*`, `*${dow}*`, "",
        "These sites have NOT submitted today's attendance / end times. Please submit:"];
      PEND.forEach((s, i) => {
        const sup = (SUPMAP[s] || []).join(", ");
        lines.push(`${i + 1}. ${s}${sup ? " — " + sup : ""}`);
      });
      return lines.join("\n");
    }
    function copyEndReminder() {
      const t = endReminderText();
      (navigator.clipboard ? navigator.clipboard.writeText(t) : Promise.reject())
        .then(() => alert("Reminder copied — paste it in the group"))
        .catch(() => window.prompt("Copy this reminder:", t));
    }
    function shareEndReminder() {
      window.open("https://wa.me/?text=" + encodeURIComponent(endReminderText()), "_blank");
    }

    function fmtDMY(iso) { const [y, m, d] = iso.split("-"); return `${d}/${m}/${y}`; }
    function todayIso() { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }

    function card(label, value, accent) {
      return `<div class="card bg-white border border-gray-200 rounded-xl shadow-sm p-4">
        <p class="text-2xl font-bold ${accent || "text-gray-800"}">${value}</p>
        <p class="text-xs text-gray-500 mt-1">${label}</p></div>`;
    }

    function setToday() { document.getElementById("date").value = todayIso(); load(); }

    async function boot() {
      const r = await vmmsApi("/api/v1/me");
      if (r.ok) { ME = await r.json(); }
      // site → supervisor names, for the end-time reminder message
      const rs = await vmmsApi("/api/v1/sites");
      if (rs.ok) (await rs.json()).forEach(s => {
        SUPMAP[s.site_name] = (s.supervisors || []).map(x => x.name);
      });
      document.getElementById("date").value = todayIso();
      await load();
    }

    async function load() {
      const date = document.getElementById("date").value || todayIso();
      const r = await vmmsApi(`/api/v1/dashboard?date=${date}`);
      if (!r.ok) { if (r.status === 401) vmmsLogout(); return; }
      const d = await r.json();

      document.getElementById("asof").textContent = `As of ${fmtDMY(d.date)}`;

      // print header fields
      document.getElementById("p-date").textContent = fmtDMY(d.date);
      const now = new Date();
      document.getElementById("p-gen").textContent =
        fmtDMY(todayIso()) + " " + String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0") + " SGT";
      document.getElementById("p-user").textContent = ME ? ME.name : "—";

      document.getElementById("cards").innerHTML = d.scoped
        ? card("My sites", d.total_sites) +
          card("Allocated this day", d.today_allocated, "text-red-700") +
          card("MC this day", d.today_mc ?? 0, "text-yellow-600") +
          card("Month normal hours", d.month_normal_hours) +
          card("Month OT hours", d.month_ot_hours, "text-red-700")
        : card("Active workers", d.total_workers) +
          card("On leave", d.on_leave, "text-yellow-600") +
          card("Active sites", d.total_sites) +
          card("Allocated this day", d.today_allocated, "text-red-700") +
          card("MC this day", d.today_mc ?? 0, "text-yellow-600") +
          card("Month normal hours", d.month_normal_hours) +
          card("Month OT hours", d.month_ot_hours, "text-red-700");

      // Hide the "HOME LEAVE" pseudo-entry from the updates list (site request)
      const notLeave = x => x.toUpperCase() !== "HOME LEAVE";
      const pend = (d.pending_updates || []).filter(notLeave);
      const done = (d.completed_updates || []).filter(notLeave);
      document.getElementById("pending").textContent =
        pend.length ? pend.join(", ") : "None — all sites submitted ✓";
      document.getElementById("completed").textContent =
        done.length ? done.join(", ") : "None yet";

      // End-time reminder for the co-ordinator (admin / main supervisor)
      PEND = pend; PEND_DATE = d.date;
      const canRemind = ME && (ME.role === "admin" || ME.role === "main_sup") && pend.length > 0;
      document.getElementById("endremind").classList.toggle("hidden", !canRemind);

      document.getElementById("sites").innerHTML = d.site_summary.map(s =>
        `<tr class="border-t border-gray-200">
           <td class="p-3 font-medium text-gray-800">${s.site_name}</td>
           <td class="p-3 text-right">${s.today}</td>
           <td class="p-3 text-right">${s.month_nh}</td>
           <td class="p-3 text-right ${s.month_ot > 0 ? "text-red-700 font-bold" : ""}">${s.month_ot}</td>
         </tr>`).join("");

      const tNh = d.site_summary.reduce((a, s) => a + s.month_nh, 0);
      const tOt = d.site_summary.reduce((a, s) => a + s.month_ot, 0);
      const tDay = d.site_summary.reduce((a, s) => a + s.today, 0);
      document.getElementById("sites-foot").innerHTML =
        `<tr><td class="p-3">TOTAL</td>
             <td class="p-3 text-right">${tDay}</td>
             <td class="p-3 text-right">${Math.round(tNh * 10) / 10}</td>
             <td class="p-3 text-right">${Math.round(tOt * 10) / 10}</td></tr>`;
    }

    document.getElementById("date").addEventListener("change", load);
    boot();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
